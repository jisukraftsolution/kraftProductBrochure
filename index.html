<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRAFT</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    #languageSelect {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-size: 14px;
      background: white;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .download-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
    }

    .download-btn:active {
      opacity: 0.85;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 180px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title" id="title">KRAFT 소개자료</div>

    <select id="languageSelect">
      <option value="ko">한국어</option>
      <option value="ja">日本語</option>
      <option value="en">English</option>
    </select>

    <div class="button-group">
      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/1Hb928JQ6lB2lxOUqNYVglzMCP8Y7d8VX/export/pptx"
      >
        ⬇ 국문 PPT 다운로드
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/15KZ3LmDW4bX9WW5rR_fEpbwUgxWSwU4L/export/pptx"
      >
        ⬇ 日本語 PPT ダウンロード
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/176N1dBCol9bSIeJbeL962nU9KlGfQ5qp/export/pptx"
      >
        ⬇ Download English PPT
      </a>
    </div>
  </div>

  <iframe id="slideFrame" allowfullscreen></iframe>

  <script>
    const lang = navigator.language || navigator.userLanguage;

    const embeds = {
      ko: "https://docs.google.com/presentation/d/e/2PACX-1vTkv2S4VfBQ8yOizvUNjUZDqnCrumHUveRk0q9M_YiIhG9XMenyCr9hUyS9md3eCQ/embed?start=false&loop=false&delayms=60000",
      ja: "https://docs.google.com/presentation/d/e/2PACX-1vQ71injeZrSVZonZ0lrJ_ceP7kmoWWyHWQi9VUM3WX7zZhlaIrMpJd0Lin16f9E7A/embed?start=false&loop=false&delayms=60000",
      en: "https://docs.google.com/presentation/d/e/2PACX-1vR19Tysg2EOyP_tZScSZcEX9u-gczNemD6QqI8jL8aOFtq212rAGcDd0LRA0QsLzw/embed?start=false&loop=false&delayms=60000"
    };

    const titles = {
      ko: "KRAFT 소개자료",
      ja: "KRAFT 紹介資料",
      en: "KRAFT Introduction"
    };

    const languageSelect = document.getElementById("languageSelect");
    const titleEl = document.getElementById("title");
    const slideFrame = document.getElementById("slideFrame");

    function applyLocale(locale) {
      if (!embeds[locale]) locale = "en";

      titleEl.innerText = titles[locale];
      slideFrame.src = embeds[locale];
      languageSelect.value = locale;
      document.documentElement.lang = locale;
    }

    let locale = "en";

    if (lang.startsWith("ko")) {
      locale = "ko";
    } else if (lang.startsWith("ja")) {
      locale = "ja";
    }

    applyLocale(locale);

    languageSelect.addEventListener("change", (e) => {
      applyLocale(e.target.value);
    });
  </script>
</body>
</html>
