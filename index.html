<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRAFT 소개자료</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .download-btn {
      display: inline-block;
      padding: 12px 20px;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
    }

    .download-btn:active {
      opacity: 0.8;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 90px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">KRAFT 소개자료</div>
    <a
      class="download-btn"
      href="https://docs.google.com/presentation/d/1t8gK5NIxNX00CniZvBGaCCU75SAcEB0u/export/pptx"
    >
      PPT 다운로드
    </a>
  </div>

  <iframe
    src="https://docs.google.com/presentation/d/1t8gK5NIxNX00CniZvBGaCCU75SAcEB0u/embed?start=false&loop=false&delayms=3000"
    allowfullscreen>
  </iframe>
</body>
</html>
