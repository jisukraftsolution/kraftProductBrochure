<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRAFT</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 16px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .button-group {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .download-btn {
      display: inline-block;
      padding: 10px 16px;
      background: #111827;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 130px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title" id="title">KRAFT 소개자료</div>

    <div class="button-group">
      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/1Hb928JQ6lB2lxOUqNYVglzMCP8Y7d8VX/export/pptx">
        국문 버전
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/15KZ3LmDW4bX9WW5rR_fEpbwUgxWSwU4L/export/pptx">
        日本語版
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/176N1dBCol9bSIeJbeL962nU9KlGfQ5qp/export/pptx">
        English
      </a>
    </div>
  </div>

  <iframe id="slideFrame" allowfullscreen></iframe>

  <script>
    const lang = navigator.language || navigator.userLanguage;

    const embeds = {
      ko: "https://docs.google.com/presentation/d/e/2PACX-1vTkv2S4VfBQ8yOizvUNjUZDqnCrumHUveRk0q9M_YiIhG9XMenyCr9hUyS9md3eCQ/embed?start=false&loop=false&delayms=60000",
      ja: "https://docs.google.com/presentation/d/e/2PACX-1vQ71injeZrSVZonZ0lrJ_ceP7kmoWWyHWQi9VUM3WX7zZhlaIrMpJd0Lin16f9E7A/embed?start=false&loop=false&delayms=60000",
      en: "https://docs.google.com/presentation/d/e/2PACX-1vR19Tysg2EOyP_tZScSZcEX9u-gczNemD6QqI8jL8aOFtq212rAGcDd0LRA0QsLzw/embed?start=false&loop=false&delayms=60000"
    };

    let locale = "en";

    if (lang.startsWith("ko")) {
      locale = "ko";
      document.getElementById("title").innerText = "KRAFT 소개자료";
    } else if (lang.startsWith("ja")) {
      locale = "ja";
      document.getElementById("title").innerText = "KRAFT 紹介資料";
    } else {
      document.getElementById("title").innerText = "KRAFT Introduction";
    }

    document.getElementById("slideFrame").src = embeds[locale];
  </script>
</body>
</html>
