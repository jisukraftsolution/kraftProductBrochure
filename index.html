<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KRAFT</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", sans-serif;
      background: #f7f7f7;
    }

    .header {
      padding: 14px 18px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
    }

    #languageSelect {
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
    }

    .button-group {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #111827;
      font-size: 14px;
      font-weight: 500;
      padding: 6px 8px;
      border-radius: 8px;
    }

    .download-btn:hover {
      background: #f3f4f6;
    }

    .download-icon {
      width: 18px;
      height: 18px;
      border: 1px solid #d1d5db;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #374151;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 130px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="top-row">
      <div class="title" id="title">KRAFT 소개자료</div>

      <select id="languageSelect">
        <option value="ko">KO</option>
        <option value="ja">JA</option>
        <option value="en">EN</option>
      </select>
    </div>

    <div class="button-group">
      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/1Hb928JQ6lB2lxOUqNYVglzMCP8Y7d8VX/export/pptx"
      >
        국문 PPT
        <span class="download-icon">↓</span>
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/15KZ3LmDW4bX9WW5rR_fEpbwUgxWSwU4L/export/pptx"
      >
        日本語 PPT
        <span class="download-icon">↓</span>
      </a>

      <a
        class="download-btn"
        href="https://docs.google.com/presentation/d/176N1dBCol9bSIeJbeL962nU9KlGfQ5qp/export/pptx"
      >
        English PPT
        <span class="download-icon">↓</span>
      </a>
    </div>
  </div>

  <iframe id="slideFrame" allowfullscreen></iframe>

  <script>
    const lang = navigator.language || navigator.userLanguage;

    const embeds = {
      ko: "https://docs.google.com/presentation/d/e/2PACX-1vTkv2S4VfBQ8yOizvUNjUZDqnCrumHUveRk0q9M_YiIhG9XMenyCr9hUyS9md3eCQ/embed?start=false&loop=false&delayms=60000",
      ja: "https://docs.google.com/presentation/d/e/2PACX-1vQ71injeZrSVZonZ0lrJ_ceP7kmoWWyHWQi9VUM3WX7zZhlaIrMpJd0Lin16f9E7A/embed?start=false&loop=false&delayms=60000",
      en: "https://docs.google.com/presentation/d/e/2PACX-1vR19Tysg2EOyP_tZScSZcEX9u-gczNemD6QqI8jL8aOFtq212rAGcDd0LRA0QsLzw/embed?start=false&loop=false&delayms=60000"
    };

    const titles = {
      ko: "KRAFT 소개자료",
      ja: "KRAFT 紹介資料",
      en: "KRAFT Introduction"
    };

    const languageSelect = document.getElementById("languageSelect");
    const titleEl = document.getElementById("title");
    const slideFrame = document.getElementById("slideFrame");

    function applyLocale(locale) {
      if (!embeds[locale]) locale = "en";

      titleEl.innerText = titles[locale];
      slideFrame.src = embeds[locale];
      languageSelect.value = locale;
      document.documentElement.lang = locale;
    }

    let locale = "en";

    if (lang.startsWith("ko")) locale = "ko";
    else if (lang.startsWith("ja")) locale = "ja";

    applyLocale(locale);

    languageSelect.addEventListener("change", (e) => {
      applyLocale(e.target.value);
    });
  </script>
</body>
</html>
